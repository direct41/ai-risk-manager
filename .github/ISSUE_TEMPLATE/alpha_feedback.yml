name: Alpha feedback
description: Share feedback from running AI Risk Manager on a real repository
labels: [alpha-feedback]
body:
  - type: input
    id: pr_url
    attributes:
      label: PR URL tested
      description: Public GitHub PR URL if you used `riskmap review-pr`. Leave blank for local-only runs.
      placeholder: https://github.com/OWNER/REPO/pull/123
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Repository context
      description: Stack, framework, test tools, and repository shape.
      placeholder: FastAPI + pytest service, Django/DRF API, Express API, monorepo package, etc.
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command used
      placeholder: riskmap review-pr https://github.com/OWNER/REPO/pull/123
    validations:
      required: true
  - type: textarea
    id: useful
    attributes:
      label: What was useful?
      description: Mention the top findings, test actions, or merge triage output that helped.
    validations:
      required: true
  - type: textarea
    id: noisy
    attributes:
      label: What was noisy, confusing, or missing?
      description: Include false positives, unclear wording, missed risks, or setup blockers.
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Relevant output snippets
      description: Paste short snippets from merge_triage.md, pr_summary.md, report.md, or findings.json. Avoid secrets.
    validations:
      required: false
