name: AI Risk Analysis

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  baseline-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-python-env

      - name: Analyze main
        run: |
          riskmap analyze \
            --mode full \
            --no-llm \
            --analysis-engine deterministic \
            --ci-mode advisory \
            --output-dir ./.riskmap || {
            rc=$?
            if [ "$rc" -ne 2 ]; then
              exit "$rc"
            fi
            echo "Preflight unsupported for this repository; skipping baseline preparation."
          }

      - name: Prepare baseline
        run: |
          if [ -f ./.riskmap/graph.json ] && [ -f ./.riskmap/findings.json ]; then
            mkdir -p ./.riskmap/baseline
            cp ./.riskmap/graph.json ./.riskmap/baseline/graph.json
            cp ./.riskmap/findings.json ./.riskmap/baseline/findings.json
          else
            echo "Missing baseline artifacts (graph.json/findings.json); baseline not prepared."
          fi

      - name: Save baseline cache
        if: hashFiles('./.riskmap/baseline/graph.json') != '' && hashFiles('./.riskmap/baseline/findings.json') != ''
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ./.riskmap/baseline
          key: baseline-${{ github.repository }}-${{ github.sha }}

      - name: Upload artifacts
        if: hashFiles('./.riskmap/report.md') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: risk-analysis-main-${{ github.sha }}
          path: ./.riskmap/
          if-no-files-found: ignore

  analyze-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pr_summary_b64: ${{ steps.pr_summary.outputs.body_b64 }}
    steps:
      # fetch-depth: 0 is required for PR diff mode against the base branch.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup-python-env

      - name: Restore baseline cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ./.riskmap/baseline
          key: baseline-${{ github.repository }}-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            baseline-${{ github.repository }}-

      - name: Analyze PR
        run: |
          mkdir -p ./.riskmap
          if [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ]; then
            provider_flags="--no-llm"
            analysis_engine="deterministic"
            ci_mode="advisory"
          elif [ "${AIRISK_ENABLE_LLM:-0}" = "1" ]; then
            provider_flags="--provider auto"
            analysis_engine="${AIRISK_ANALYSIS_ENGINE:-hybrid}"
            ci_mode="${AIRISK_CI_MODE:-advisory}"
          else
            provider_flags="--no-llm"
            analysis_engine="deterministic"
            ci_mode="${AIRISK_CI_MODE:-advisory}"
          fi
          riskmap analyze \
            --mode pr \
            --base "${{ github.base_ref }}" \
            ${provider_flags} \
            --analysis-engine "${analysis_engine}" \
            --only-new \
            --ci-mode "${ci_mode}" \
            --output-dir ./.riskmap \
            --baseline-graph ./.riskmap/baseline/graph.json || {
            rc=$?
            if [ "$rc" -ne 2 ]; then
              exit "$rc"
            fi
            echo "Preflight unsupported for this repository in PR mode; writing fallback summary."
            printf '%s\n' \
              '<!-- ai-risk-manager -->' \
              '## AI Risk Manager' \
              '' \
              '- Decision: `review_required`' \
              '- Headline: Repository preflight is unsupported in strict PR mode; run a manual release-risk review.' \
              '- Risk score: `0/100`' \
              '- Scope: `full_fallback`' \
              '- Fallback: `unsupported_repository_preflight`' \
              > ./.riskmap/pr_summary.md
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: risk-analysis-pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          path: ./.riskmap/
          if-no-files-found: warn

      - name: Export PR summary for trusted comment job
        id: pr_summary
        if: hashFiles('./.riskmap/pr_summary.md') != ''
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import base64
          from pathlib import Path

          body = Path(".riskmap/pr_summary.md").read_bytes()
          print("body_b64=" + base64.b64encode(body).decode("ascii"))
          PY

  comment-pr:
    if: github.event_name == 'pull_request' && needs.analyze-pr.outputs.pr_summary_b64 != ''
    needs: analyze-pr
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Upsert PR comment
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SUMMARY_B64: ${{ needs.analyze-pr.outputs.pr_summary_b64 }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          from urllib import error, parse, request

          marker = "<!-- ai-risk-manager -->"
          repo = os.environ["GITHUB_REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GITHUB_TOKEN"]
          body = base64.b64decode(os.environ["SUMMARY_B64"], validate=True).decode("utf-8").strip()
          if marker not in body:
              body = f"{marker}\n{body}"

          def github_json(method: str, path: str, payload: dict | None = None):
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              req = request.Request(
                  f"https://api.github.com{path}",
                  data=data,
                  method=method,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                      "User-Agent": "ai-risk-manager-workflow",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              try:
                  with request.urlopen(req, timeout=20) as response:
                      raw = response.read()
              except error.HTTPError as exc:
                  detail = exc.read().decode("utf-8", errors="replace")[:400]
                  raise SystemExit(f"GitHub API {method} {path} failed with {exc.code}: {detail}") from exc
              return None if not raw else json.loads(raw.decode("utf-8"))

          safe_repo = parse.quote(repo, safe="/")
          comments = github_json("GET", f"/repos/{safe_repo}/issues/{pr_number}/comments?per_page=100")
          existing = next(
              (row for row in comments if isinstance(row, dict) and marker in str(row.get("body", ""))),
              None,
          )
          if existing is not None:
              github_json("PATCH", f"/repos/{safe_repo}/issues/comments/{int(existing['id'])}", {"body": body})
          else:
              github_json("POST", f"/repos/{safe_repo}/issues/{pr_number}/comments", {"body": body})
          PY
