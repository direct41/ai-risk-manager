name: Publish Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-and-attest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Verify release tag matches package version
        env:
          AIRISK_RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          test "$(git cat-file -t "$AIRISK_RELEASE_TAG")" = "tag"
          git merge-base --is-ancestor HEAD origin/main
          python scripts/check_release_tag.py "$AIRISK_RELEASE_TAG"

      - name: Install pinned release toolchain
        run: python -m pip install --upgrade -r .github/requirements/release.txt

      - name: Build distributions once
        run: python -m build --no-isolation --sdist --wheel --outdir packages

      - name: Validate and smoke distributions
        run: |
          python -m twine check packages/*.whl packages/*.tar.gz
          wheel="$(find packages -maxdepth 1 -name '*.whl' -print -quit)"
          python -m venv "${RUNNER_TEMP}/release-smoke"
          "${RUNNER_TEMP}/release-smoke/bin/python" -m pip install --upgrade pip==26.1.2
          "${RUNNER_TEMP}/release-smoke/bin/python" -m pip install "${wheel}[api]"
          "${RUNNER_TEMP}/release-smoke/bin/riskmap" analyze \
            --sample \
            --no-llm \
            --analysis-engine deterministic \
            --output-dir "${RUNNER_TEMP}/release-sample"
          test -s "${RUNNER_TEMP}/release-sample/report.md"
          "${RUNNER_TEMP}/release-smoke/bin/python" -c \
            "from ai_risk_manager.api.server import create_app; assert create_app() is not None"

      - name: Generate checksums and reproducible SBOM
        run: |
          mkdir -p evidence
          sha256sum packages/*.whl packages/*.tar.gz > evidence/SHA256SUMS
          cyclonedx-py environment \
            "${RUNNER_TEMP}/release-smoke/bin/python" \
            --pyproject pyproject.toml \
            --mc-type library \
            --output-reproducible \
            --output-format JSON \
            --output-file evidence/runtime-api-sbom.cdx.json

      - name: Attest distribution provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            packages/*.whl
            packages/*.tar.gz

      - name: Upload release distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-distributions
          path: packages/
          if-no-files-found: error

      - name: Upload release evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-evidence
          path: evidence/
          if-no-files-found: error

  publish-pypi:
    needs: build-and-attest
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ai-risk-manager
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download attested distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-distributions
          path: packages

      - name: Publish with PyPI trusted publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: packages/
