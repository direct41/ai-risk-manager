name: Eval Suite

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-python-env

      - name: Restore eval trend cache
        uses: actions/cache/restore@v4
        with:
          path: ./eval/.history
          key: eval-trend-${{ github.repository }}-${{ github.run_id }}
          restore-keys: |
            eval-trend-${{ github.repository }}-

      - name: Run eval suite
        env:
          AIRISK_EVAL_ENFORCE_THRESHOLDS: "1"
        run: |
          python scripts/run_eval_suite.py

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-suite-${{ github.run_id }}
          path: eval/results/
          if-no-files-found: error

      - name: Save eval trend cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ./eval/.history
          key: eval-trend-${{ github.repository }}-${{ github.run_id }}
