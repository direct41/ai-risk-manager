name: Quality Gates

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Ruff
        run: ruff check src tests scripts

      - name: Public artifact gate
        run: python scripts/check_public_artifacts.py

      - name: Mypy
        run: mypy src

      - name: Pytest + coverage
        run: pytest --cov=ai_risk_manager --cov-fail-under=80

      - name: Minimal install smoke (no extras)
        run: |
          set -o pipefail
          python -m venv .venv-min
          . .venv-min/bin/activate
          python -m pip install --upgrade pip
          python -m pip install .
          python -c "import ai_risk_manager.api.server"
          riskmap analyze \
            --sample \
            --no-llm \
            --analysis-engine deterministic \
            --output-dir "${RUNNER_TEMP}/riskmap-sample" \
            | tee "${RUNNER_TEMP}/riskmap-sample.log"
          test -s "${RUNNER_TEMP}/riskmap-sample/report.md"
          grep -Fq "Support level applied: l2" "${RUNNER_TEMP}/riskmap-sample.log"
          set +e
          output="$(riskmap-api 2>&1)"
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "Expected riskmap-api to fail without [api] extras."
            exit 1
          fi
          echo "$output" | grep -Fq "Install API dependencies with: pip install -e '.[api]'."
