stages:
  - risk_review

riskmap_merge_request_review:
  stage: risk_review
  image: python:3.12-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  allow_failure: true
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  cache:
    paths:
      - .cache/pip
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends git
    - python -m pip install --upgrade pip
    - python -m pip install "git+https://github.com/direct41/ai-risk-manager.git"
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" --depth=100 || true
  script:
    - |
      set +e
      riskmap analyze \
        --mode pr \
        --base "origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}" \
        --analysis-engine deterministic \
        --no-llm \
        --only-new \
        --ci-mode advisory \
        --output-dir ./.riskmap
      rc=$?
      set -e
      if [ "$rc" -eq 2 ]; then
        echo "AI Risk Manager preflight unsupported for this repository; keeping advisory job green."
        exit 0
      fi
      exit "$rc"
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - .riskmap/
